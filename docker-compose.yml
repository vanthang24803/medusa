services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: ecommerce
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        volumes: [pgdata:/var/lib/postgresql/data]
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 3s
            retries: 5

    redis:
        image: redis
        ports: ["6379:6379"]

volumes:
    pgdata:
    miniodata:
